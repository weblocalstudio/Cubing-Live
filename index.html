<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubing Live - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="img/cubo1.png" alt="Cubing Live Logo" class="channel-logo">
            <span>Cubing Live</span>
        </div>
        
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#sobre-mi">Sobre mí</a>
            <a href="#contactanos">Contáctanos</a>
        </nav>
    </header>

    <main id="inicio">
        <h1>Cubing Live</h1>
        <p class="subtitle">¡Bienvenidos a mi rincón de speedcubing y cubos de Rubik!</p>

        <div class="rubik-images">
            <img src="img/cubo1.png" alt="Cubo de Rubik 3x3">
            <img src="img/cubo2.jpg" alt="Cubo Rubik de velocidad">
        </div>

        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/52wAli39rzM" 
                title="Presentación de Cubing Live :)" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </iframe>
        </div>

        <a href="https://www.youtube.com/@RJCuberEspa%C3%B1a" target="_blank" class="btn-youtube">
            Visita mi Canal de YouTube
        </a>
        
        <div class="dummy-scroll">
            <p>(Espacio de prueba: Haz scroll hacia abajo para ver cómo la barra de arriba se mantiene fija siempre)</p>
        </div>
    </main>

</body>
</html>
